<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="100%" height="100%" fill="#18181b"/>
  <!-- Workpiece -->
  <rect x="40" y="160" width="260" height="70" fill="#27272a" stroke="#52525b" stroke-width="3"/>
  <path d="M 40 160 L 160 160 L 160 185 L 300 185" fill="none" stroke="#22d3ee" stroke-width="5"/>
  
  <!-- Cutting Tool -->
  <path d="M 180 70 L 170 150 L 152 155 L 148 135 L 160 70 Z" fill="#71717a" stroke="#d4d4d8" stroke-width="3"/>
  <circle cx="156" cy="151" r="4" fill="#ef4444"/> <!-- cutting point -->
  
  <!-- Sparks / Chips -->
  <path d="M 148 150 Q 120 120 100 150" fill="none" stroke="#fbbf24" stroke-width="3" opacity="0.9"/>
  <path d="M 148 150 Q 100 110 80 140" fill="none" stroke="#fbbf24" stroke-width="2" opacity="0.6"/>
  <path d="M 152 145 Q 130 90 90 120" fill="none" stroke="#f59e0b" stroke-width="2" opacity="0.7"/>

  <!-- Path lines -->
  <path d="M 170 90 L 270 90" fill="none" stroke="#38bdf8" stroke-width="3" stroke-dasharray="6, 6" opacity="0.6"/>
  <path d="M 260 80 L 270 90 L 260 100" fill="none" stroke="#38bdf8" stroke-width="3" opacity="0.6"/>
  
  <!-- Measurement lines -->
  <path d="M 40 240 L 300 240 M 40 235 L 40 245 M 300 235 L 300 245" fill="none" stroke="#71717a" stroke-width="2"/>
  <text x="170" y="260" fill="#71717a" font-family="monospace" font-size="14" text-anchor="middle">MACHINING PATH</text>
</svg>