<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M 60 0 L 0 0 0 60" fill="none" stroke="rgba(34, 211, 238, 0.05)" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(34, 211, 238, 0.1)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>
  <rect width="100%" height="100%" fill="#09090b" />
  <rect width="100%" height="100%" fill="url(#grid)" />
  <circle cx="80%" cy="20%" r="30%" fill="url(#glow)" />
  <circle cx="20%" cy="80%" r="40%" fill="url(#glow)" />
  <g stroke="rgba(34, 211, 238, 0.1)" fill="none" stroke-width="1.5">
    <circle cx="80%" cy="20%" r="200" stroke-dasharray="10, 15" />
    <circle cx="80%" cy="20%" r="150" />
    <circle cx="20%" cy="80%" r="300" stroke-dasharray="5, 20" />
    <circle cx="20%" cy="80%" r="250" />
    <path d="M 20% 80% L 80% 20%" stroke-dasharray="4, 8" />
    <path d="M 0 50% L 100% 50%" stroke-dasharray="2, 10" />
    <path d="M 50% 0 L 50% 100%" stroke-dasharray="2, 10" />
  </g>
</svg>