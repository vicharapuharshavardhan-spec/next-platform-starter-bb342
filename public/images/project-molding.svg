<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <rect width="100%" height="100%" fill="#18181b"/>
  <!-- Mold halves -->
  <rect x="70" y="40" width="110" height="220" fill="none" stroke="#3f3f46" stroke-width="6"/>
  <rect x="220" y="40" width="110" height="220" fill="none" stroke="#3f3f46" stroke-width="6"/>
  
  <!-- Fill inside of mold to create depth -->
  <rect x="73" y="43" width="104" height="214" fill="#27272a" />
  <rect x="223" y="43" width="104" height="214" fill="#27272a" />

  <!-- Bottle silhouette inside -->
  <path d="M 180 60 C 190 60, 190 80, 185 90 C 180 100, 160 110, 160 150 C 160 220, 170 240, 200 240 C 230 240, 240 220, 240 150 C 240 110, 220 100, 215 90 C 210 80, 210 60, 220 60 Z" fill="none" stroke="#22d3ee" stroke-width="4" stroke-dasharray="6, 6"/>
  
  <path d="M 180 60 L 220 60" stroke="#22d3ee" stroke-width="4" />
  <path d="M 170 240 L 230 240" stroke="#22d3ee" stroke-width="4" />

  <!-- Guide pins -->
  <circle cx="100" cy="70" r="8" fill="#a1a1aa"/>
  <circle cx="100" cy="230" r="8" fill="#a1a1aa"/>
  <rect x="220" y="62" width="25" height="16" fill="#a1a1aa" opacity="0.5"/>
  <rect x="220" y="222" width="25" height="16" fill="#a1a1aa" opacity="0.5"/>

  <!-- Arrows pushing together -->
  <path d="M 30 150 L 60 150 M 50 140 L 60 150 L 50 160" fill="none" stroke="#38bdf8" stroke-width="5"/>
  <path d="M 370 150 L 340 150 M 350 140 L 340 150 L 350 160" fill="none" stroke="#38bdf8" stroke-width="5"/>
</svg>